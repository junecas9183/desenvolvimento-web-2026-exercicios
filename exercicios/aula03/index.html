<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Email</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistemas de envio de E-mails de Júnior</h1>
        </header>

        <main class="grid">
            <section class="form-section">
                <form id="emailForm">
                    <div class="field">
                        <label for="from">De:</label>
                        <input type="email" id="from" placeholder="seu@email.com" required>
                    </div>
                    <div class="field">
                        <label for="to">Para:</label>
                        <input type="text" id="to" placeholder="destinatario@email.com" required>
                    </div>
                    <div class="row">
                        <div class="field">
                            <label for="cc">Cc:</label>
                            <input type="text" id="cc"> 
                        </div>
                        <div class="field">
                            <label for="bcc">Bcc:</label>
                            <input type="text" id="bcc">
                        </div>
                    </div>
                    <div class="field">
                        <label for="subject">Assunto:</label>
                        <input type="text" id="subject" required>
                    </div>
                    <div class="field">
                        <label for="priority">Prioridade:</label>
                        <select id="priority">
                            <option value="normal">Normal</option>
                            <option value="alta">Alta</option>
                            <option value="baixa">Baixa</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="body">Mensagem:</label>
                        <textarea id="body" rows="6"></textarea>
                    </div>
                    <div class="actions">
                        <button type="submit" id="btnSend">Enviar</button>
                        <button type="reset" id="btnClear">Limpar</button>
                    </div>
                </form>
            </section>

            <section class="preview-section">
                <h3>Visualização</h3>
                <div id="emailPreview" class="preview-box">
                    <div class="preview-header">
                        <p><strong>De:</strong> <span id="pFrom"></span></p>
                        <p><strong>Para:</strong> <span id="pTo"></span></p>
                        <p><strong>Assunto:</strong> <span id="pSubject"></span></p>
                        <div id="pPriority" class="priority-tag"></div>
                    </div>
                    <div class="preview-body" id="pBody"></div>
                </div>
                
                <div id="loader" class="hidden">
                    <div class="spinner"></div>
                    <span>Enviando...</span>
                </div>
            </section>
        </main>

        <section class="history-section">
            <h3>Histórico de Enviados</h3>
            <ul id="historyList"></ul>
            <button id="clearHistory" class="btn-danger">Limpar Tudo</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
